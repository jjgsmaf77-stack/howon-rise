<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0;url=https://howon-rise-admin.vercel.app" />
  <link rel="canonical" href="https://howon-rise-admin.vercel.app" />
  <meta name="robots" content="noindex" />
  <title>호원RISE 성과 입력관리로 이동 중...</title>
  <style>
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a2540 0%, #16548c 100%);
      color: #fff;
      text-align: center;
    }
    .box {
      max-width: 420px;
      padding: 32px;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 8px 0;
      font-weight: 700;
    }
    p {
      opacity: 0.85;
      font-size: 14px;
      line-height: 1.6;
      margin: 6px 0;
    }
    .loader {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin-top: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a {
      color: #fff;
      font-weight: 600;
      margin-top: 16px;
      display: inline-block;
      padding: 10px 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.25);
    }
    a:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">✏️</div>
    <h1>성과 입력관리</h1>
    <p>담당자 입력 시스템으로 이동 중입니다...</p>
    <div class="loader"></div>
    <p style="margin-top:24px; font-size:12px;">자동 이동되지 않으면 아래 버튼을 클릭하세요</p>
    <a href="https://howon-rise-admin.vercel.app">입력관리 열기 →</a>
  </div>
  <script>
    window.location.replace('https://howon-rise-admin.vercel.app');
  </script>
</body>
</html>
