<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="호원대학교 심볼">
  <defs>
    <linearGradient id="lg-shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2a93b6"/>
      <stop offset="45%" stop-color="#173a6b"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
    <linearGradient id="lg-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lg-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffc93c"/>
      <stop offset="100%" stop-color="#f5b700"/>
    </linearGradient>
  </defs>
  <!-- Shield base -->
  <path d="M32 3 L57 12 V30 C57 46 46 56 32 61 C18 56 7 46 7 30 V12 Z"
        fill="url(#lg-shield)" stroke="#061529" stroke-width="1"/>
  <!-- Inner highlight -->
  <path d="M32 6 L54 13.8 V30 C54 43.6 44.4 52.6 32 57.2 C19.6 52.6 10 43.6 10 30 V13.8 Z"
        fill="url(#lg-inner)"/>
  <!-- Accent bar -->
  <rect x="18" y="41.5" width="28" height="2.4" rx="1.2" fill="url(#lg-accent)"/>
  <!-- H monogram -->
  <g fill="#ffffff">
    <rect x="20" y="17" width="3.6" height="22" rx="0.8"/>
    <rect x="40.4" y="17" width="3.6" height="22" rx="0.8"/>
    <rect x="20"   y="26.4" width="24" height="3.2" rx="0.8"/>
  </g>
  <!-- Small star mark -->
  <circle cx="32" cy="46.8" r="1.4" fill="#ffffff"/>
</svg>
